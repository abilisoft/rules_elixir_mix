name: Bazel

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  schedule:
    - cron: "20 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
  # Fork pull requests do not receive repository secrets. Empty overrides keep
  # their required checks local while trusted builds retain BuildBuddy.
  BAZEL_REMOTE_FALLBACK: ${{ secrets.BUILDBUDDY_ORG_API_KEY == '' && '--remote_cache= --remote_executor= --bes_backend= --bes_results_url=' || '' }}

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      BAZEL_PLATFORM_FLAGS: --platforms=//:ci_execution_platform_${{ matrix.arch }} --extra_execution_platforms=//:ci_execution_platform_${{ matrix.arch }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Validate Starlark
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:buildifier_test
      - name: Analyze public rule surface
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test:analysis_fixture
          //test:analysis_test_lib
          //test:common_test_analysis_fixture
          //test:deps_update_analysis_fixture
          //test:ecto_analysis_fixture
          //test:elixir_ls_analysis_fixture
          //test:erlang_analysis_fixture
          //test:escript_analysis_fixture
          //test:eunit_analysis_fixture
          //test:exunit_analysis_fixture
          //test:format_analysis_fixture
          //test:format_sources_analysis_fixture
          //test:hex_assets_analysis_fixture
          //test:iex_analysis_fixture
          //test:lcov_analysis_fixture
          //test:local_analysis_fixture
          //test:lock_analysis
          //test:native_analysis_fixture
          //test:otp_runtime_closure_analysis
          //test:phx_assets_analysis_fixture
          //test:phx_server_analysis_fixture
          //test:provider_crypto_sdk
          //test:release_analysis_fixture
          //test:runtime_archive_analysis_fixture
          //test:rustler_nif_analysis_fixture
          //test:rustler_precompiled_selection_analysis
          //test:rustler_precompiled_staging_analysis_fixture_compile
          //test:static_crypto_sdk
          //test:toolchain_analysis
          //test:typecheck_analysis_fixture
          //test:version_catalog_analysis
          //test:wallaby_analysis_fixture
      - name: Analyze FIPS and provider runtime surface
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          --extra_toolchains=//test:fips_otp_toolchain,//test:fips_toolchain
          //test:fips_analysis_fixture
          //test:fips_release_analysis_fixture
          //test:fips_runtime_analysis_fixture

  integration:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      BAZEL_PLATFORM_FLAGS: --platforms=//:ci_execution_platform_${{ matrix.arch }} --extra_execution_platforms=//:ci_execution_platform_${{ matrix.arch }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Execute Mix, Hex, Rebar, ExUnit, release, and analysis actions
        working-directory: integration
        run: |
          # shellcheck disable=SC2086
          bazel test \
            ${BAZEL_REMOTE_FALLBACK} \
            ${BAZEL_PLATFORM_FLAGS} \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" \
            //:coverage \
            //:credo \
            //:dialyzer \
            //:direct_erlang_common_test \
            //:direct_erlang_eunit_test \
            //:direct_erlang_reproducibility_test \
            //:format \
            //:prebuilt_otp_smoke_${{ matrix.arch }} \
            //:release_test \
            //:sobelow \
            //:source_catalog_format \
            //:source_catalog_test \
            //:task_test \
            //:test \
            //:typecheck \
            //:type_deps_dialyzer \
            //:xref \
            //dialyzer_fixture:dialyzer
          # shellcheck disable=SC2086
          bazel test ${BAZEL_REMOTE_FALLBACK} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" --test_sharding_strategy=forced=2 //:test
          # shellcheck disable=SC2086
          bazel build ${BAZEL_REMOTE_FALLBACK} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:digested_assets //:locked_live_view_javascript //:locked_sobelow_codegen //:minimal_escript_codegen
          test ! -e bazel-bin/lib_compile_build/.rules_elixir_mix_state
      - name: Reject an ABI-incompatible bootstrap before source compilation
        if: matrix.arch == 'x86_64'
        working-directory: integration
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:prebuilt_otp_rejection_arm64_on_x86
      - name: Exercise the writable local cache twice
        working-directory: integration
        run: |
          # shellcheck disable=SC2086
          bazel run ${BAZEL_REMOTE_FALLBACK} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:source_catalog_format_sources
          # shellcheck disable=SC2086
          bazel run ${BAZEL_REMOTE_FALLBACK} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:local
          # shellcheck disable=SC2086
          RULES_ELIXIR_MIX_REQUIRE_WARM_CACHE=true bazel run ${BAZEL_REMOTE_FALLBACK} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:local
          test ! -e lib/integration/generated_by_bazel.ex
          # shellcheck disable=SC2086
          bazel test ${BAZEL_REMOTE_FALLBACK} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:format //:typecheck //:xref

  source-toolchain:
    name: Source toolchain (${{ matrix.arch }}, ${{ matrix.libc }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            libc: musl
            runner: ubuntu-24.04
            platform_flags: --platforms=//:source_target_x86_64 --extra_execution_platforms=//:source_execution_x86_64,//:source_escript_execution_x86_64
            toolchain_name: catalog_source_x86_64
          - arch: arm64
            libc: musl
            runner: ubuntu-24.04-arm
            platform_flags: --platforms=//:source_target_arm64 --extra_execution_platforms=//:source_execution_arm64,//:source_escript_execution_arm64
            toolchain_name: catalog_source_arm64
          - arch: x86_64
            libc: glibc
            runner: ubuntu-24.04
            platform_flags: --platforms=//:source_target_glibc_x86_64 --extra_execution_platforms=//:source_execution_x86_64,//:source_escript_execution_x86_64
            toolchain_name: catalog_source_glibc_x86_64
          - arch: arm64
            libc: glibc
            runner: ubuntu-24.04-arm
            platform_flags: --platforms=//:source_target_glibc_arm64 --extra_execution_platforms=//:source_execution_arm64,//:source_escript_execution_arm64
            toolchain_name: catalog_source_glibc_arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      BAZEL_PLATFORM_FLAGS: ${{ matrix.platform_flags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Verify the bootstrap ABI before the source build
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        working-directory: source_integration
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//:source_execution_${{ matrix.arch }}
          --extra_execution_platforms=//:source_execution_${{ matrix.arch }}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          @elixir_config//${{ matrix.toolchain_name }}:bootstrap_smoke_test
      - name: Test source-built OTP, Elixir, Phoenix, LiveView, FIPS, and release runtime
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        working-directory: source_integration
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:fips_runtime
          //:release_test
          //:test
      - name: Execute a provider-backed escript as a declared tool
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        working-directory: source_integration
        run: >-
          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:source_escript_codegen
      - name: Analyze the source-toolchain graph without remote credentials
        if: ${{ env.BUILDBUDDY_ORG_API_KEY == '' }}
        working-directory: source_integration
        # Fork pull requests cannot execute the native Arm64 runtime from this
        # AMD64 client. Trusted CI executes the complete matrix above.
        run: >-
          # shellcheck disable=SC2086

          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          @elixir_config//${{ matrix.toolchain_name }}:runtime
          //:source_escript_codegen
      - name: Require a warm source-toolchain cache
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        working-directory: source_integration
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:fips_runtime
          //:release_test
          //:test
      - name: Require a warm provider-backed escript cache
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        working-directory: source_integration
        run: >-
          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:source_escript_codegen

  source-cross-toolchain:
    name: Source cross-toolchain (AMD64 GNU execution to ARM64 musl)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Build ARM64 OTP with the declared AMD64 bootstrap runtime
        if: ${{ env.BUILDBUDDY_ORG_API_KEY != '' }}
        working-directory: source_integration
        run: >-
          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//:source_target_cross_arm64
          --extra_execution_platforms=//:source_execution_x86_64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          @elixir_config//catalog_source_cross_arm64:otp
      - name: Analyze the cross-toolchain graph without remote credentials
        if: ${{ env.BUILDBUDDY_ORG_API_KEY == '' }}
        working-directory: source_integration
        run: >-
          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//:source_target_cross_arm64
          --extra_execution_platforms=//:source_execution_x86_64
          @elixir_config//catalog_source_cross_arm64:otp

  validate-gate:
    name: validate
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every validation architecture
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MATRIX_RESULT: ${{ needs.validate.result }}
        with:
          script: |
            if (process.env.MATRIX_RESULT !== "success") {
              core.setFailed(`validation matrix ended with ${process.env.MATRIX_RESULT}`);
            }

  integration-gate:
    name: integration
    needs: integration
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every integration architecture
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MATRIX_RESULT: ${{ needs.integration.result }}
        with:
          script: |
            if (process.env.MATRIX_RESULT !== "success") {
              core.setFailed(`integration matrix ended with ${process.env.MATRIX_RESULT}`);
            }

  source-toolchain-gate:
    name: source-toolchain
    needs:
      - source-cross-toolchain
      - source-toolchain
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every source-toolchain architecture
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CROSS_RESULT: ${{ needs.source-cross-toolchain.result }}
          MATRIX_RESULT: ${{ needs.source-toolchain.result }}
        with:
          script: |
            if (process.env.MATRIX_RESULT !== "success") {
              core.setFailed(`source-toolchain matrix ended with ${process.env.MATRIX_RESULT}`);
            }
            if (process.env.CROSS_RESULT !== "success") {
              core.setFailed(`source cross-toolchain ended with ${process.env.CROSS_RESULT}`);
            }

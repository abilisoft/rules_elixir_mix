name: Bazel

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  schedule:
    - cron: "20 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
  # Fork pull requests do not receive repository secrets. Empty overrides keep
  # their required checks local while trusted builds retain BuildBuddy.
  BAZEL_REMOTE_FALLBACK: ${{ secrets.BUILDBUDDY_ORG_API_KEY == '' && '--remote_cache= --remote_executor= --bes_backend= --bes_results_url=' || '' }}

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      BAZEL_ARCH_REMOTE_FLAGS: ${{ matrix.arch == 'arm64' && '--remote_executor=' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Validate Starlark
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_ARCH_REMOTE_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:buildifier_test
      - name: Analyze public rule surface
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_ARCH_REMOTE_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test:analysis_fixture
          //test:analysis_test_lib
          //test:common_test_analysis_fixture
          //test:ecto_analysis_fixture
          //test:elixir_ls_analysis_fixture
          //test:erlang_analysis_fixture
          //test:eunit_analysis_fixture
          //test:exunit_analysis_fixture
          //test:format_analysis_fixture
          //test:iex_analysis_fixture
          //test:lcov_analysis_fixture
          //test:local_analysis_fixture
          //test:lock_analysis
          //test:native_analysis_fixture
          //test:phx_assets_analysis_fixture
          //test:phx_server_analysis_fixture
          //test:provider_crypto_sdk
          //test:release_analysis_fixture
          //test:runtime_archive_analysis_fixture
          //test:rustler_nif_analysis_fixture
          //test:static_crypto_sdk
          //test:toolchain_analysis
          //test:typecheck_analysis_fixture
          //test:version_catalog_analysis
          //test:wallaby_analysis_fixture
      - name: Analyze FIPS and provider runtime surface
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel build --nobuild
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_ARCH_REMOTE_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          --extra_toolchains=//test:fips_otp_toolchain,//test:fips_toolchain
          //test:fips_analysis_fixture
          //test:fips_release_analysis_fixture
          //test:fips_runtime_analysis_fixture

  integration:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    container:
      image: elixir@sha256:d430c98a3ba7c97bdfe688e29e8c4378966519c79af04963cc9276f7f2013ecc
    env:
      BAZEL_ARCH_REMOTE_FLAGS: ${{ matrix.arch == 'arm64' && '--remote_executor=' || '' }}
      BAZEL_PLATFORM_FLAGS: --platforms=//:ci_execution_platform_${{ matrix.arch }} --extra_execution_platforms=//:ci_execution_platform_${{ matrix.arch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Package pinned OTP and Elixir runtimes deterministically
        run: |
          tar --sort=name --mtime=@0 --owner=0 --group=0 --numeric-owner --format=gnu -czf /tmp/rules-elixir-mix-ci-otp-${{ matrix.arch }}.tar.gz -C /usr/local/lib/erlang .
          install -m 0644 integration/ELIXIR_VERSION /usr/local/lib/elixir/VERSION
          tar --sort=name --mtime=@0 --owner=0 --group=0 --numeric-owner --format=gnu -czf /tmp/rules-elixir-mix-ci-elixir-${{ matrix.arch }}.tar.gz -C /usr/local/lib/elixir .
      - name: Check source-catalog maintenance formatting
        run: mix format --check-formatted tools/source_catalog.ex tools/source_catalog_test.exs tools/update_source_catalog.exs
      - name: Test source-catalog maintenance
        run: elixir tools/source_catalog_test.exs
      - name: Execute Mix, Hex, Rebar, ExUnit, release, and analysis actions
        working-directory: integration
        run: |
          # shellcheck disable=SC2086
          bazel test \
            ${BAZEL_REMOTE_FALLBACK} \
            ${BAZEL_ARCH_REMOTE_FLAGS} \
            ${BAZEL_PLATFORM_FLAGS} \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" \
            //:coverage \
            //:credo \
            //:dialyzer \
            //:direct_erlang_common_test \
            //:direct_erlang_eunit_test \
            //:direct_erlang_reproducibility_test \
            //:format \
            //:release_test \
            //:sobelow \
            //:task_test \
            //:test \
            //:typecheck \
            //:type_deps_dialyzer \
            //:xref \
            //dialyzer_fixture:dialyzer
          # shellcheck disable=SC2086
          bazel test ${BAZEL_REMOTE_FALLBACK} ${BAZEL_ARCH_REMOTE_FLAGS} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" --test_sharding_strategy=forced=2 //:test
          # shellcheck disable=SC2086
          bazel build ${BAZEL_REMOTE_FALLBACK} ${BAZEL_ARCH_REMOTE_FLAGS} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:digested_assets
          test ! -e bazel-bin/lib_compile_build/.rules_elixir_mix_state
      - name: Exercise the writable local cache twice
        working-directory: integration
        run: |
          # shellcheck disable=SC2086
          bazel run ${BAZEL_REMOTE_FALLBACK} ${BAZEL_ARCH_REMOTE_FLAGS} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:local
          # shellcheck disable=SC2086
          RULES_ELIXIR_MIX_REQUIRE_WARM_CACHE=true bazel run ${BAZEL_REMOTE_FALLBACK} ${BAZEL_ARCH_REMOTE_FLAGS} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:local
          test ! -e lib/integration/generated_by_bazel.ex
          # shellcheck disable=SC2086
          bazel test ${BAZEL_REMOTE_FALLBACK} ${BAZEL_ARCH_REMOTE_FLAGS} ${BAZEL_PLATFORM_FLAGS} --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:format //:typecheck //:xref

  source-toolchain:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    container:
      image: erlang@sha256:ec20ffd1224a25f6105eec70a684fd2d7f2cf83084dedb669346644bcee4c466
    env:
      BAZEL_ARCH_REMOTE_FLAGS: ${{ matrix.arch == 'arm64' && '--remote_executor=' || '' }}
      BAZEL_PLATFORM_FLAGS: --platforms=//:source_platform_${{ matrix.arch }} --extra_execution_platforms=//:source_platform_${{ matrix.arch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Package the checksum-pinned bootstrap runtime
        run: >-
          tar --sort=name --mtime=@0 --owner=0 --group=0 --numeric-owner
          --format=gnu -czf /tmp/rules-elixir-mix-ci-otp-bootstrap-${{ matrix.arch }}.tar.gz
          -C /usr/local/lib/erlang .
      - name: Build the catalog-default OTP and Elixir tuple from pristine sources
        working-directory: source_integration
        # These fixed environment values intentionally contain Bazel argument lists.
        run: >-
          # shellcheck disable=SC2086

          bazel build
          ${BAZEL_REMOTE_FALLBACK}
          ${BAZEL_ARCH_REMOTE_FLAGS}
          ${BAZEL_PLATFORM_FLAGS}
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          @elixir_config//catalog_source_${{ matrix.arch }}:runtime

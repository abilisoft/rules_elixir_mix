name: Bazel

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Validate Starlark
        run: >-
          bazel test
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:buildifier_test
      - name: Analyze public rule surface
        run: >-
          bazel build --nobuild
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //test:analysis_fixture
          //test:analysis_test_lib
          //test:common_test_analysis_fixture
          //test:ecto_analysis_fixture
          //test:elixir_ls_analysis_fixture
          //test:erlang_analysis_fixture
          //test:eunit_analysis_fixture
          //test:exunit_analysis_fixture
          //test:format_analysis_fixture
          //test:iex_analysis_fixture
          //test:lcov_analysis_fixture
          //test:local_analysis_fixture
          //test:lock_analysis
          //test:native_analysis_fixture
          //test:phx_assets_analysis_fixture
          //test:phx_server_analysis_fixture
          //test:provider_crypto_sdk
          //test:release_analysis_fixture
          //test:rustler_nif_analysis_fixture
          //test:static_crypto_sdk
          //test:toolchain_analysis
          //test:typecheck_analysis_fixture
          //test:wallaby_analysis_fixture
      - name: Analyze FIPS and provider runtime surface
        run: >-
          bazel build --nobuild
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          --extra_toolchains=//test:fips_otp_toolchain,//test:fips_toolchain
          //test:fips_analysis_fixture
          //test:fips_release_analysis_fixture
          //test:fips_runtime_analysis_fixture

  integration:
    runs-on: ubuntu-24.04
    container:
      image: hexpm/elixir@sha256:50b4199b1b892d140add53647af4c8e593c441ee8320f168f5eb66a5032d7379
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Package pinned OTP and Elixir runtimes deterministically
        run: |
          tar --sort=name --mtime=@0 --owner=0 --group=0 --numeric-owner --format=gnu -czf /tmp/rules-elixir-mix-ci-otp-container.tar.gz -C /usr/local/lib/erlang .
          install -m 0644 integration/ELIXIR_VERSION /usr/local/lib/elixir/VERSION
          tar --sort=name --mtime=@0 --owner=0 --group=0 --numeric-owner --format=gnu -czf /tmp/rules-elixir-mix-ci-elixir-with-version.tar.gz -C /usr/local/lib/elixir .
      - name: Execute Mix, Hex, Rebar, ExUnit, release, and analysis actions
        working-directory: integration
        run: |
          bazel test \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" \
            //:coverage \
            //:credo \
            //:dialyzer \
            //:direct_erlang_common_test \
            //:direct_erlang_eunit_test \
            //:direct_erlang_reproducibility_test \
            //:format \
            //:release_test \
            //:sobelow \
            //:task_test \
            //:test \
            //:typecheck \
            //:type_deps_dialyzer \
            //:xref \
            //dialyzer_fixture:dialyzer
          bazel test --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" --test_sharding_strategy=forced=2 //:test
          bazel build --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:digested_assets
          test ! -e bazel-bin/lib_compile_build/.rules_elixir_mix_state
      - name: Exercise the writable local cache twice
        working-directory: integration
        run: |
          bazel run --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:local
          RULES_ELIXIR_MIX_REQUIRE_WARM_CACHE=true bazel run --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:local
          test ! -e lib/integration/generated_by_bazel.ex
          bazel test --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}" //:format //:typecheck //:xref

  source-toolchain:
    runs-on: ubuntu-24.04
    container:
      image: erlang@sha256:ec20ffd1224a25f6105eec70a684fd2d7f2cf83084dedb669346644bcee4c466
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Package the checksum-pinned bootstrap runtime
        run: >-
          tar --sort=name --mtime=@0 --owner=0 --group=0 --numeric-owner
          --format=gnu -czf /tmp/rules-elixir-mix-ci-otp-erlang-29.0.3.tar.gz
          -C /usr/local/lib/erlang .
      - name: Build OTP 29.0.3 and Elixir 1.20.2 from pristine sources
        working-directory: source_integration
        run: >-
          bazel build
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          @elixir_config//otp29_elixir120_source:runtime

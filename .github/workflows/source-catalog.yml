name: Source catalog

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-catalog
  cancel-in-progress: false

env:
  BUILDBUDDY_ORG_API_KEY: ${{ secrets.BUILDBUDDY_ORG_API_KEY }}
  BAZEL_REMOTE_FALLBACK: ${{ secrets.BUILDBUDDY_ORG_API_KEY == '' && '--remote_cache= --remote_executor= --bes_backend= --bes_results_url=' || '' }}

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-version: 1.29.0
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Validate the catalog updater with the declared BEAM toolchain
        working-directory: integration
        run: >-
          bazel test
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//:ci_execution_platform_x86_64
          --extra_execution_platforms=//:ci_execution_platform_x86_64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:source_catalog_format
          //:source_catalog_test
      - name: Refresh stable source releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        working-directory: integration
        run: >-
          bazel run
          ${BAZEL_REMOTE_FALLBACK}
          --platforms=//:ci_execution_platform_x86_64
          --extra_execution_platforms=//:ci_execution_platform_x86_64
          --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_ORG_API_KEY}"
          //:source_catalog_update
      - name: Open or update the catalog pull request
        id: catalog_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: bzlmod/versions.bzl
          branch: automation/source-catalog
          commit-message: "deps: update BEAM source catalog"
          delete-branch: true
          sign-commits: true
          title: "deps: update BEAM source catalog"
          body: |
            Update the immutable OTP and Elixir source catalog from their
            official latest stable GitHub releases.

            The downloaded archives are hashed but never executed by this
            workflow. Every protected-branch check, including the full Bazel
            matrix, must pass before this change is eligible to merge.
      - name: Require verified bot commits
        if: steps.catalog_pr.outputs.pull-request-operation == 'created' || steps.catalog_pr.outputs.pull-request-operation == 'updated'
        run: test "${{ steps.catalog_pr.outputs.pull-request-commits-verified }}" = "true"
      - name: Dispatch Bazel validation
        if: steps.catalog_pr.outputs.pull-request-operation == 'created' || steps.catalog_pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run test.yaml --ref automation/source-catalog
      - name: Dispatch CodeQL
        if: steps.catalog_pr.outputs.pull-request-operation == 'created' || steps.catalog_pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run codeql.yml --ref automation/source-catalog
      - name: Dispatch dependency review
        if: steps.catalog_pr.outputs.pull-request-operation == 'created' || steps.catalog_pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run dependency-review.yml --ref automation/source-catalog --field base_ref=main --field head_ref=automation/source-catalog
      - name: Dispatch Trivy
        if: steps.catalog_pr.outputs.pull-request-operation == 'created' || steps.catalog_pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run trivy.yml --ref automation/source-catalog
